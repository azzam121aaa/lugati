<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>منصة لغتي</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:"Tajawal",sans-serif;
      background:
      radial-gradient(1200px 600px at 20% 10%, rgba(255,122,0,.12), transparent 60%),
      radial-gradient(1000px 520px at 80% 30%, rgba(0,180,255,.10), transparent 55%),
      radial-gradient(900px 520px at 50% 90%, rgba(25,179,107,.10), transparent 55%),
      #ffffff;
    }

    .topbar{
      padding:10px;
      background:linear-gradient(90deg,#ff7a00,#ff0099,#00b4ff,#19b36b);
      color:#fff;
      font-weight:900;
      text-align:center;
    }

    .wrap{
      width:92%;
      max-width:1000px;
      margin:20px auto;
    }

    .hero{
      padding:18px;
      border-radius:18px;
      background:#fff;
      box-shadow:0 18px 45px rgba(0,0,0,.12);
    }

    h1{
      margin:0;
      font-size:28px;
      font-weight:900;
    }

    .sub{
      color:#555;
      margin-top:6px;
      font-weight:700;
    }

    .panel{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      background:#f8fafc;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ddd;
      margin-top:6px;
    }

    .btn{
      padding:12px;
      border-radius:14px;
      border:0;
      font-weight:900;
      cursor:pointer;
    }

    .primary{
      background:#ff7a00;
      color:#fff;
    }

    .actions{
      margin-top:16px;
      display:grid;
      gap:12px;
    }

    .big{
      padding:16px;
      border-radius:16px;
      background:linear-gradient(135deg,#ff7a00,#ff9a2f);
      color:#fff;
      font-size:18px;
      text-decoration:none;
      text-align:center;
      font-weight:900;
    }

    .footer{
      text-align:center;
      margin-top:20px;
      color:#555;
      font-weight:900;
    }
  </style>
</head>

<body>

<div class="topbar">
✨ منصة لغتي — مدرسة الإمام الشوكاني ✨
</div>

<div class="wrap">
<div class="hero">

<h1>منصة لغتي</h1>
<p class="sub">كل شيء يعمل — وكل زر يفتح صفحة مستقلة ✅</p>

<div class="panel">
<h3>بيانات الطالب</h3>

<input id="name" placeholder="اسم الطالب">
<input id="cls" placeholder="الصف">

<button class="btn primary" onclick="save()">💾 حفظ</button>
<p id="welcome"></p>

</div>

<div class="actions">

<!-- 🔥 تم الربط هنا -->
<a class="big" href="https://azzam121aaa.github.io/drs/">📘 الدروس</a>

<a class="big" href="https://azzam121aaa.github.io/fhm/">📖 الفهم القرائي</a>

<a class="big" href="#">🎧 نصوص الاستماع (لاحقاً)</a>

</div>

</div>

<div class="footer">
برمجة الطالب: عزام اللذيذ <br>
تحت إشراف الأستاذ: مقرن المطيري
</div>

</div>

<script>
function save(){
  let n = document.getElementById("name").value;
  let c = document.getElementById("cls").value;

  localStorage.setItem("name", n);
  localStorage.setItem("class", c);

  document.getElementById("welcome").innerHTML =
  "🎉 أهلاً " + n + " — صفك " + c;
}

window.onload = function(){
  let n = localStorage.getItem("name");
  let c = localStorage.getItem("class");

  if(n && c){
    document.getElementById("welcome").innerHTML =
    "🎉 أهلاً " + n + " — صفك " + c;
  }
}
</script>

</body>
</html>
