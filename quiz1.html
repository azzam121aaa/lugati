<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الاختبارات</title>

<style>
body{
  font-family:tahoma;
  background:#f5f5f5;
  padding:20px;
}

.container{max-width:900px;margin:auto}

.topbar{
  background:#f97316;
  color:#fff;
  padding:15px;
  border-radius:15px;
  text-align:center;
  font-size:22px;
  margin-bottom:15px;
}

.btns{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#333;
  color:#fff;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.question{margin-bottom:10px}

.hidden{display:none}

.submit{
  width:100%;
  padding:15px;
  background:#16a34a;
  color:#fff;
  font-size:18px;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">📝 منصة الاختبارات</div>

<div class="btns">
  <button onclick="showLesson(1)">الدرس 1</button>
  <button onclick="showLesson(2)">الدرس 2</button>
  <button onclick="showLesson(3)">الدرس 3</button>
</div>

<!-- الدرس 1 -->
<div id="lesson1" class="card">
<h3>أسلوب الشرط والتوكيد</h3>

<div class="question">
1) أسلوب الشرط هو:
<br>
<input type="radio" name="q1_1" value="1"> تركيب يربط جملتين<br>
<input type="radio" name="q1_1" value="0"> نداء<br>
</div>

<div class="question">
2) من أدوات الشرط:
<br>
<input type="radio" name="q1_2" value="1"> من<br>
<input type="radio" name="q1_2" value="0"> إلى<br>
</div>

<button class="submit" onclick="submitQuiz(1,2)">إرسال</button>
</div>

<!-- الدرس 2 -->
<div id="lesson2" class="card hidden">
<h3>الاسم المقصور والمنقوص</h3>

<div class="question">
1) مثال المقصور:
<br>
<input type="radio" name="q2_1" value="1"> فتى<br>
<input type="radio" name="q2_1" value="0"> دعاء<br>
</div>

<div class="question">
2) المنقوص:
<br>
<input type="radio" name="q2_2" value="1"> راضٍ<br>
<input type="radio" name="q2_2" value="0"> عصا<br>
</div>

<button class="submit" onclick="submitQuiz(2,2)">إرسال</button>
</div>

<!-- الدرس 3 -->
<div id="lesson3" class="card hidden">
<h3>الألف اللينة</h3>

<div class="question">
1) إذا كان الأصل واو:
<br>
<input type="radio" name="q3_1" value="1"> قائمة<br>
<input type="radio" name="q3_1" value="0"> ياء<br>
</div>

<div class="question">
2) إذا كان الأصل ياء:
<br>
<input type="radio" name="q3_2" value="1"> على صورة الياء<br>
<input type="radio" name="q3_2" value="0"> قائمة<br>
</div>

<button class="submit" onclick="submitQuiz(3,2)">إرسال</button>
</div>

</div>

<script>

function showLesson(n){
  for(let i=1;i<=3;i++){
    document.getElementById("lesson"+i).classList.add("hidden");
  }
  document.getElementById("lesson"+n).classList.remove("hidden");
}

function submitQuiz(lesson,total){
  let score = 0;

  for(let i=1;i<=total;i++){
    let q = document.querySelector(`input[name="q${lesson}_${i}"]:checked`);
    if(q) score += Number(q.value);
  }

  alert("درجتك: " + score + " من " + total);
}

</script>

</body>
</html>
