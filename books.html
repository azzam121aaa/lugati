<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>كتاب لغتي - منصة لغتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff;--panel:rgba(255,255,255,.78);--text:#151515;--muted:rgba(0,0,0,.62);--stroke:rgba(0,0,0,.09);
      --accent:#ff7a00;--accent2:#ff9a2f;--shadow:0 18px 45px rgba(0,0,0,.12);--soft:0 10px 25px rgba(0,0,0,.10);--r:18px;--font:"Tajawal",system-ui}
    [data-theme="dark"]{--bg:#071826;--panel:rgba(8,24,38,.72);--text:#f3f6f9;--muted:rgba(243,246,249,.72);--stroke:rgba(255,255,255,.12);
      --accent:#19b36b;--accent2:#0f7f4b;--shadow:0 22px 55px rgba(0,0,0,.45);--soft:0 12px 30px rgba(0,0,0,.40);}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:var(--font);color:var(--text);background:var(--bg);padding:18px}
    .wrap{width:min(900px,92vw);margin:0 auto}
    .head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
    .btn{border:0;cursor:pointer;border-radius:14px;padding:12px 16px;font-weight:1000;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:10px}
    .ghost{background:rgba(255,255,255,.45);border:1px solid var(--stroke);color:var(--text);box-shadow:var(--soft)}
    [data-theme="dark"] .ghost{background:rgba(255,255,255,.08)}
    .primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .panel{margin-top:14px;padding:16px;border-radius:var(--r);background:linear-gradient(180deg,var(--panel),rgba(255,255,255,.06));border:1px solid var(--stroke);box-shadow:var(--shadow)}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    @media(max-width:900px){.cards{grid-template-columns:1fr}}
    .card{border:1px solid var(--stroke);border-radius:16px;background:rgba(255,255,255,.40);padding:14px;box-shadow:var(--soft)}
    [data-theme="dark"] .card{background:rgba(255,255,255,.08)}
    .muted{color:var(--muted);font-weight:900}
  </style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1 style="margin:0;font-weight:1000">📚 كتاب لغتي</h1>
      <div class="muted" id="studentLine"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <a class="btn ghost" href="index.html">🏠 الواجهة</a>
      <a class="btn ghost" href="results.html">📊 نتائجك</a>
    </div>
  </div>

  <div class="panel">
    <div class="cards">
      <div class="card">
        <div style="font-weight:1000">📘 كتاب لغتي الجميلة — غير محلول</div>
        <div class="muted" style="margin-top:6px">صفحة الكتاب (حلول كتاب)</div>
        <div style="margin-top:10px">
          <a class="btn primary" target="_blank" rel="noopener"
             href="https://www.hululktaab.com/%D9%83%D8%AA%D8%A7%D8%A8-%D9%84%D8%BA%D8%AA%D9%8A-%D8%B3%D8%A7%D8%AF%D8%B3-%D9%84%D8%B9%D8%A7%D9%85/">
             فتح ↗
          </a>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:1000">✅ كتاب لغتي الجميلة — محلول</div>
        <div class="muted" style="margin-top:6px">الرابط الذي أرسلته</div>
        <div style="margin-top:10px">
          <a class="btn primary" target="_blank" rel="noopener"
             href="https://www.hululktaab.com/dir/class1/6bf1/lgty/w2/?dir=lg6bf2.txt">
             فتح ↗
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.body.setAttribute("data-theme", localStorage.getItem("lughaty_theme") || "light");
  const f = localStorage.getItem("lughaty_font") || "Tajawal";
  document.documentElement.style.setProperty("--font", `"${f}", system-ui, -apple-system, "Segoe UI", Arial`);
  const name = localStorage.getItem("lughaty_name") || "";
  const cls = localStorage.getItem("lughaty_class") || "";
  document.getElementById("studentLine").textContent = (name && cls) ? `🎓 ${name} — ${cls}` : "🎓 بيانات الطالب غير محفوظة";
</script>
</body>
</html>
