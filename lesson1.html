<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أسلوب الشرط والتوكيد</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --light-bg-1:#fff7ed;
      --light-bg-2:#ffffff;
      --light-main:#f97316;
      --light-main-2:#fb923c;
      --light-card:rgba(255,255,255,.93);
      --light-text:#2b2b2b;
      --light-sub:#7c4a1d;
      --light-border:rgba(249,115,22,.16);

      --dark-bg-1:#0f172a;
      --dark-bg-2:#0b1f35;
      --dark-main:#0f766e;
      --dark-main-2:#14532d;
      --dark-card:rgba(9,18,35,.88);
      --dark-text:#f8fafc;
      --dark-sub:#b8d6d0;
      --dark-border:rgba(16,185,129,.16);
    }

    body{
      font-family:Tahoma,Arial,sans-serif;
      color:var(--light-text);
      min-height:100vh;
      background:linear-gradient(135deg,var(--light-bg-1),var(--light-bg-2));
      transition:.35s;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    body.dark{
      color:var(--dark-text);
      background:linear-gradient(135deg,var(--dark-bg-1),var(--dark-bg-2));
    }

    .card{
      width:min(800px,100%);
      background:var(--light-card);
      border:1px solid var(--light-border);
      border-radius:28px;
      padding:34px 24px;
      text-align:center;
    }

    body.dark .card{
      background:var(--dark-card);
      border-color:var(--dark-border);
    }

    h1{
      font-size:32px;
      margin-bottom:16px;
    }

    p{
      font-size:18px;
      line-height:2;
      color:var(--light-sub);
      margin-bottom:20px;
    }

    body.dark p{
      color:var(--dark-sub);
    }

    .video-link,
    .start-btn,
    .back-btn{
      display:inline-block;
      text-decoration:none;
      border:none;
      cursor:pointer;
      padding:14px 22px;
      border-radius:18px;
      font-size:18px;
      font-weight:700;
      color:#fff;
      margin:8px;
      background:linear-gradient(135deg,var(--light-main),var(--light-main-2));
    }

    body.dark .video-link,
    body.dark .start-btn,
    body.dark .back-btn{
      background:linear-gradient(135deg,var(--dark-main),var(--dark-main-2));
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>الدرس الأول: أسلوب الشرط والتوكيد</h1>
    <p>اضغط على رابط شرح الفيديو من عين، ثم ابدأ الاختبار.</p>

    <a class="video-link" href="ضع-رابط-عين-هنا" target="_blank">🎥 شرح الدرس من عين</a>
    <a class="start-btn" href="quiz1.html">📝 ابدأ الاختبار</a>
    <button class="back-btn" onclick="location.href='index.html'">⬅ العودة للدروس</button>
  </div>

  <script>
    if(localStorage.getItem("lugati_lessons_theme")==="dark"){
      document.body.classList.add("dark");
    }
  </script>
</body>
</html>
